<div class="container mt-5">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white py-3">
      <h2 class="mb-0 fs-4">Nova Categoria de Equipamento</h2>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="salvar()">
        <div class="mb-4">
          <label class="form-label">Nome da Categoria</label>
          <input type="text" class="form-control" formControlName="nome" placeholder="Ex: Micro-ondas, Geladeira">
          <div *ngIf="form.get('nome')?.touched && form.get('nome')?.invalid" class="text-danger small mt-1">
            O nome é obrigatório (mínimo 3 letras).
          </div>
        </div>

        <div class="d-flex justify-content-end border-top pt-3">
          <button type="button" class="btn btn-outline-secondary me-2" routerLink="/categorias">Cancelar</button>
          <button type="submit" class="btn btn-primary px-4" [disabled]="form.invalid">Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>
