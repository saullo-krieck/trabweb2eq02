<div class="container mt5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h2 class="mb-0 fs-4">
                        <i class="bi bi-person-plus me-2"></i>Autocadastro
                    </h2>
                </div>
                <div class="card-body p-4">
                    <div *ngIf="sucesso" class="alert alert-success">{{ sucesso }}</div>
                    <div *ngIf="erro" class="alert alert-danger">{{ erro }} </div>

                    <form [formGroup]="form" (ngSubmit)="cadastrar()">
                        <h6 class="text-muted mb-3">Dados Pessoais</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" formControlName="nome">
                                <div *ngIf="form.get('nome')?.touched && form.get('nome')?.invalid"
                                    class="text-danger small mt-1">
                                    Nome é obrigatório (mínimo 3 caracteres)
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">E-mail</label>
                                <input type="email" class="form-control" formControlName="email">
                                <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                                    Informe um e-mail válido.
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">CPF</label>
                                <input type="text" class="form-control" formControlName="cpf" mask="000.000.000-00"
                                    [dropSpecialCharacters]="false" placeholder="000.000.000-00">
                                <div *ngIf="form.get('cpf')?.touched && form.get('cpf')?.error?.[cpfInvalido]"
                                    class="text-danger small mt-1">
                                    CPF inválido.
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Telefone</label>
                                <input type="text" class="form-control" formControlName="telefone"
                                    mask="(00) 00000-0000" placeholder="(00) 00000-0000">
                                <div *ngIf="form.get('telefone')?.touched && form.get('telefone')?.invalid"
                                    class="text-danger small mt-1">
                                    Telefone é obrigatório.
                                </div>
                            </div>
                        </div>

                        <h6 class="text-muted mb-3">Endereço</h6>
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">CEP</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" formControlName="cep" mask="00000-000"
                                        placeholder="00000-000" (blur)="buscarCep()">
                                    <span class="input-group-text">
                                        <span *ngIf="buscandoCep" class="spinner-border spinner-border-sm"></span>
                                        <i *ngIf="!buscandoCep" class="bi bi-search"></i>
                                    </span>
                                </div>
                                <div *ngIf="form.get('cep')?.errors?.['cepInvalido']" class="text-danger small mt-1">
                                    CEP não encontrado
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Logradouro</label>
                                <input type="text" class="form-control" formControlName="logradouro">
                            </div>
                            
                        </div>
                </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
