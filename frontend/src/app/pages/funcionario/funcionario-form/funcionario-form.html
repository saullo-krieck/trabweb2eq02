<div class="container mt-5">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white py-3">
      <h2 class="mb-0 fs-4"><i class="bi bi-person-plus me-2"></i>Cadastro de Funcionário</h2>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="salvar()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-control" formControlName="nome" placeholder="Digite o nome">
            <div *ngIf="form.get('nome')?.touched && form.get('nome')?.invalid" class="text-danger small mt-1">
              Nome é obrigatório (mínimo 3 caracteres).
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">E-mail (Login)</label>
            <input type="email" class="form-control" formControlName="email" placeholder="exemplo@email.com">
            <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="text-danger small mt-1">
              Informe um e-mail válido para login.
            </div>
          </div>

          <div class="col-md-4">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" formControlName="cpf" 
                   mask="000.000.000-00" [dropSpecialCharacters]="false" placeholder="000.000.000-00">
            <div *ngIf="form.get('cpf')?.touched && form.get('cpf')?.errors?.['cpfInvalido']" class="text-danger small mt-1">
              CPF inválido. Verifique os dígitos.
            </div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" formControlName="telefone" 
                   mask="(00) 00000-0000" placeholder="(00) 00000-0000">
            <div *ngIf="form.get('telefone')?.touched && form.get('telefone')?.invalid" class="text-danger small mt-1">
              Telefone é obrigatório.
            </div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Perfil de Acesso</label>
            <select class="form-select" formControlName="perfil">
              <option value="FUNC">Funcionário</option>
              <option value="GERENTE">Gerente</option>
              <option value="ADMIN">Administrador</option>
            </select>
          </div>

          <div class="col-12 mt-4 d-flex justify-content-end border-top pt-3">
            <button type="button" class="btn btn-outline-secondary me-2" routerLink="/funcionarios">
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary px-4" [disabled]="form.invalid">
              <i class="bi bi-check-lg me-1"></i> Salvar Funcionário
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
