<div class="container mt-5">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h2 class="mb-0 fs-4">
                <i class="bi bi-inbox me-2"></i>
                Solicitações em Aberto
            </h2>
        </div>
        <div class="card-body p-0">
            <div *ngIf="erro" class="alert alert-danger m-3">{{ erro }}</div>

            <div *ngIf="solicitacoes.length === 0 && !erro" class="text-center
            text-muted py-5">
                <i class="bi bi-check-circle fs-1"></i>
                <p class="mt-2">Nenhuma solicitação em aberto.</p>
            </div>

            <table *ngIf="solicitacoes.length > 0" class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Data/Hora Abertura</th>
                        <th>Cliente</th>
                        <th>Equipamento</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let s of solicitacoes">
                        <td>{{ s.dataHoraCriacao | date:'dd/MM/yyyy HH:mm' }}</td>
                        <td>{{ s.nomeCliente }}</td>
                        <td>{{ limitar(s.descricaoEquipamento) }}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-primary" (click)="efetuarOrcamento(s.id)">
                                <i class="bi bi-calculator me-1"></i>
                                Efetuar Orçamento
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
